version: '3.8'

services:
  taskflow-optimizer:
    build:
      context: .
      dockerfile: Dockerfile.aliyun
    container_name: taskflow-optimizer
    ports:
      - "8501:8501"
    volumes:
      # 挂载数据目录，方便更新 CSV 文件
      - ./data:/app/data
      # 可选：挂载代码实现热更新（开发环境）
      # - ./app.py:/app/app.py
      # - ./scheduler.py:/app/scheduler.py
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

